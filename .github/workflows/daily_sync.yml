name: Daglig Shopify Sync

on:
  schedule:
    # Kører hver dag kl. 06:00 UTC (= 07:00 dansk vintertid / 08:00 sommertid)
    - cron: "0 6 * * *"

  # Tillader også manuel kørsel fra GitHub Actions-fanen
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode – behandler kun 10 produkter"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # afbryd efter 1 time hvis noget hænger

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installér afhængigheder
        run: pip install requests

      - name: Kør Shopify FTP Sync
        env:
          FTP_HOST:       ${{ secrets.FTP_HOST }}
          FTP_USER:       ${{ secrets.FTP_USER }}
          FTP_PASS:       ${{ secrets.FTP_PASS }}
          FTP_PATH:       ${{ secrets.FTP_PATH }}
          SHOPIFY_STORE:  ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          # TEST_MODE styres af manuel input eller sættes fast til false
          TEST_MODE:      ${{ github.event.inputs.test_mode || 'false' }}
        run: python sync_shopify.py
